tasks:
  - name: email-address
    sketch: "{□: email_address}"
    positive:
      - "john.doe@example.com"
      - "a.b+tag@sub.example.org"
    negative:
      - "not an email"
      - "missing-at.example.com"

  - name: signed-integer
    sketch: "{□: integer}"
    positive:
      - "-42"
      - "+7"
      - "0"
    negative:
      - "3.14"
      - "abc"

  - name: cvv-after-label
    sketch: "CVV:{□: cvv}"
    positive:
      - "CVV:123"
      - "CVV:1234"
    negative:
      - "CVV:12"
      - "CVV:abcd"

  - name: payment-receipt
    sketch: "CARD:{□: credit_card} EXP:{□: expiration_date} CVV:{□: cvv} AMT:{□: currency_amount}"
    positive:
      - "CARD:4111 1111 1111 1111 EXP:04/26 CVV:123 AMT:$19.95"
      - "CARD:5555-4444-3333-2222 EXP:11/27 CVV:1234 AMT:$250.00"
    negative:
      - "CARD:4111 1111 1111 1111 EXP:13/26 CVV:123 AMT:$19.95"
      - "CARD:5555-4444-3333-2222 EXP:11/27 CVV:12 AMT:$250.00"

  - name: server-log
    sketch: "{□: iso_date} {□: ipv4_address} \"{□: http_method} {□: url_path}\""
    positive:
      - '2026-04-27 192.168.0.1 "GET /api/v1/orders"'
      - '2026-04-27 10.0.0.7 "POST /checkout/pay"'
    negative:
      - '2026-04-27 not-an-ip "GET /api/v1/orders"'
      - '2026-04-27 192.168.0.1 "BLAH /api/v1/orders"'

  - name: product-code
    sketch: "{□: product_code}"
    positive:
      - "A12"
      - "AB12"
    negative:
      - "A13"
      - "ACD12"
      - "B12"

  - name: ambiguous-split
    sketch: "{□: alpha}{□: integer}"
    positive:
      - "AB123"
      - "CD456"
    negative:
      - "123AB"
      - "ABXYZ"
      - "AB_123"

  - name: nested-repeat
    sketch: "IDS:(?:{□: integer}-){2}{□: integer}"
    positive:
      - "IDS:12-34-56"
      - "IDS:7-890-12"
    negative:
      - "IDS:12-34"
      - "IDS:12-AA-56"
      - "IDS:12-34-56-78"

  - name: tuple-negative
    sketch: "{□: year}-{□: integer}"
    positive:
      - "2026-42"
    negative:
      - "3026-42"
